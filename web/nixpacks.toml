# Used when Railway Root Directory = `web` (Nixpacks). Forces Node + npm pipeline.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

# Run node directly (avoids npm "config production" deprecation warning on `npm start`).
[start]
cmd = "NODE_ENV=production node dist/index.cjs"
