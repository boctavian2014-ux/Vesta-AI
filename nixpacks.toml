# Instalare certificat FNMT în trust store-ul sistemului (Railway/Linux)
# După build, Python vede Catastro ca fiind de încredere cu verify=True

[phases.setup]
nixPkgs = ["ca-certificates"]

[phases.build]
cmds = [
    "mkdir -p /usr/local/share/ca-certificates",
    "cp fnmt_root.pem /usr/local/share/ca-certificates/fnmt.crt",
    "update-ca-certificates"
]
